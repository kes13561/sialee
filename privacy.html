<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>개인정보 처리방침</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
  <div class="max-w-3xl mx-auto p-10">
    <h1 class="text-3xl font-bold mb-6">개인정보 처리방침</h1>

    <p class="mb-4 text-slate-700">
      본 사이트는 방문자의 개인정보를 중요하게 생각합니다.
    </p>

    <h2 class="text-xl font-bold mt-6 mb-2">1. 수집하는 정보</h2>
    <p class="text-slate-700">
      본 사이트는 별도의 회원가입 없이 이용 가능하며, 광고 서비스 제공을 위해 쿠키를 사용할 수 있습니다.
    </p>

    <h2 class="text-xl font-bold mt-6 mb-2">2. 광고 및 쿠키</h2>
    <p class="text-slate-700">
      Google AdSense와 같은 제3자 광고 서비스는 쿠키를 사용하여 사용자에게 맞춤 광고를 제공합니다.
    </p>

    <h2 class="text-xl font-bold mt-6 mb-2">3. 책임 제한</h2>
    <p class="text-slate-700">
      본 사이트의 정보는 개인 경험 기반이며, 참고용으로 제공됩니다.
    </p>

    <p class="mt-6 text-sm text-slate-500">
      문의: contact 페이지 참고
    </p>
  </div>
</body>
</html>
